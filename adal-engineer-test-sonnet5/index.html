<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Idea Atlas</title>
  <style>
    :root {
      --ink: rgba(235, 240, 255, 0.92);
      --ink-dim: rgba(235, 240, 255, 0.45);
      --glass: rgba(14, 18, 34, 0.38);
      --glass-border: rgba(160, 180, 255, 0.14);
      --idea: #a878ff;
      --idea-2: #78e0ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04050c; }
    body {
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }

    .hud { position: fixed; z-index: 10; user-select: none; }
    .hud-title { animation: hudIn 1.2s ease 0.3s backwards; }
    .hud-styles { animation: hudIn 1.2s ease 0.6s backwards; }
    .hud-search { animation: hudIn 1.2s ease 0.8s backwards; }
    .hud-lenses { animation: hudIn 1.2s ease 0.9s backwards; }
    @keyframes hudIn { from { opacity: 0; } }

    .hud-title {
      top: 28px; left: 34px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .hud-title-main {
      display: flex; align-items: center; gap: 18px;
    }
    .hud-title h1 {
      font-size: 18px; font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--ink);
      text-shadow: 0 0 24px rgba(120, 150, 255, 0.35);
    }
    .hud-title span {
      font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.28em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }
    .hud-styles {
      top: 30px; right: 34px;
      display: flex; align-items: center; gap: 4px;
      padding: 5px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
    }
    .hud-styles button {
      appearance: none; border: 0; background: transparent;
      font-family: inherit; font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      padding: 7px 16px; border-radius: 999px;
      cursor: pointer;
      transition: color 0.5s ease, background 0.5s ease;
    }
    .hud-styles button:hover { color: var(--ink); }
    .hud-styles button.active {
      color: var(--ink);
      background: rgba(150, 170, 255, 0.13);
      box-shadow: inset 0 0 0 1px rgba(170, 190, 255, 0.18);
    }

    .hud-lenses { top: auto; bottom: 26px; left: 34px; right: auto; }

    /* Search box */
    .hud-search { top: 92px; left: 34px; width: 260px; }
    .search-input {
      width: 100%;
      appearance: none; border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border-radius: 999px;
      color: var(--ink);
      font-family: inherit; font-size: 12px; letter-spacing: 0.04em;
      padding: 8px 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-input::placeholder { color: rgba(235, 240, 255, 0.3); }
    .search-input:focus { border-color: rgba(160, 185, 255, 0.35); }
    .search-results {
      list-style: none; margin-top: 8px;
      background: rgba(10, 14, 28, 0.72);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      display: none;
    }
    .hud-search.has-results .search-results { display: block; }
    .search-results li {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 9px 16px; cursor: pointer;
      font-size: 12px; letter-spacing: 0.02em;
      color: rgba(228, 235, 252, 0.85);
      transition: background 0.25s;
    }
    .search-results li:hover, .search-results li.hit { background: rgba(140, 165, 255, 0.1); }
    .search-results li i {
      font-style: normal; font-size: 10px; color: var(--ink-dim);
    }

    .hud-hint {
      bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.24em;
      color: var(--ink-dim);
      pointer-events: none;
      opacity: 0; animation: hintIn 2.4s ease 1.2s forwards;
    }
    @keyframes hintIn { to { opacity: 1; } }

    .hud-reset {
      bottom: 58px; left: 50%; transform: translateX(-50%);
      width: 34px; height: 34px;
      appearance: none;
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: var(--glass);
      color: var(--ink-dim);
      font-size: 20px; line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      box-shadow: inset 0 0 0 1px rgba(170, 190, 255, 0.05);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease, transform 0.2s ease;
      animation: hudIn 1.2s ease 1.4s backwards;
    }
    .hud-reset:hover {
      color: var(--ink);
      border-color: rgba(170, 190, 255, 0.26);
      background: rgba(140, 165, 255, 0.09);
    }
    .hud-reset:active { transform: translateX(-50%) scale(0.94); }

    #fps {
      bottom: 22px; right: 30px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 10px; color: var(--ink-dim);
      display: none;
    }

    /* Composer toggle button */
    .hud-composer-toggle {
      top: 30px; right: 158px;
      width: 40px; height: 40px;
      appearance: none;
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: var(--glass);
      color: var(--ink);
      font-size: 18px; line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      transition: background 0.3s, border-color 0.3s;
      animation: hudIn 1.2s ease 0.6s backwards;
    }
    .hud-composer-toggle:hover { background: rgba(140, 165, 255, 0.14); border-color: rgba(170, 190, 255, 0.3); }

    /* Idea composer panel */
    #ideaComposer {
      position: fixed; z-index: 25;
      top: 88px; right: 34px; width: 340px;
      background: rgba(10, 14, 28, 0.72);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px) saturate(1.25);
      -webkit-backdrop-filter: blur(20px) saturate(1.25);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 16px;
      opacity: 0; pointer-events: none; transform: translateY(-8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #ideaComposer.open { opacity: 1; pointer-events: auto; transform: none; }
    .composer-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .composer-tab {
      appearance: none; border: 1px solid var(--glass-border);
      background: rgba(140, 165, 255, 0.05);
      color: var(--ink-dim);
      font-family: inherit; font-size: 11.5px; letter-spacing: 0.08em;
      padding: 6px 14px; border-radius: 999px; cursor: pointer;
      transition: color 0.3s, background 0.3s;
    }
    .composer-tab.active { color: var(--ink); background: rgba(150, 120, 255, 0.16); border-color: rgba(168, 120, 255, 0.35); }
    .composer-input {
      width: 100%; resize: vertical;
      background: rgba(4, 6, 14, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--ink);
      font-family: inherit; font-size: 12.5px; line-height: 1.5;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.3s;
    }
    .composer-input::placeholder { color: rgba(235, 240, 255, 0.28); }
    .composer-input:focus { border-color: rgba(168, 120, 255, 0.4); }
    .composer-submit {
      margin-top: 10px; width: 100%;
      appearance: none; border: 1px solid rgba(168, 120, 255, 0.3);
      background: linear-gradient(135deg, rgba(168, 120, 255, 0.22), rgba(120, 224, 255, 0.14));
      color: var(--ink);
      font-family: inherit; font-size: 12.5px; font-weight: 600; letter-spacing: 0.06em;
      padding: 10px 0; border-radius: 10px; cursor: pointer;
      transition: filter 0.3s;
    }
    .composer-submit:hover:not(:disabled) { filter: brightness(1.2); }
    .composer-submit:disabled { opacity: 0.5; cursor: default; }
    .composer-status {
      margin-top: 10px; font-size: 11.5px; line-height: 1.6; min-height: 1em;
      color: var(--ink-dim);
    }
    .composer-status--error { color: #ff8a8a; }
    .composer-status--success { color: #8affc8; }

    /* —— Hover tooltip: semi-transparent, follows cursor —— */
    #hoverTooltip {
      position: fixed; z-index: 18; top: 0; left: 0;
      width: 260px; max-width: 260px;
      background: rgba(10, 14, 28, 0.55);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      backdrop-filter: blur(14px) saturate(1.2);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      padding: 12px 14px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s ease;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    #hoverTooltip.visible { opacity: 1; }
    .tooltip-meta { display: flex; align-items: center; gap: 6px; font-size: 9.5px; letter-spacing: 0.14em; color: var(--ink-dim); }
    .tooltip-dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 6px currentColor; flex-shrink: 0; }
    .tooltip-title { margin-top: 5px; font-size: 13px; font-weight: 600; line-height: 1.3; }
    .tooltip-sub { margin-top: 4px; font-size: 11px; line-height: 1.5; color: rgba(220, 228, 250, 0.7); }
    .tooltip-novelty { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
    .tooltip-novelty-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(150, 175, 255, 0.15); overflow: hidden; }
    .tooltip-novelty-fill { height: 100%; background: linear-gradient(90deg, var(--idea), var(--idea-2)); border-radius: 2px; }
    .tooltip-novelty-label { font-size: 9.5px; color: var(--ink-dim); letter-spacing: 0.04em; white-space: nowrap; }

    /* Detail card: deep-space glass panel */
    #nodeCard {
      position: fixed; z-index: 20;
      top: 50%; right: 38px; transform: translateY(-50%) translateX(24px);
      width: 400px; max-height: 88vh;
      perspective: 1600px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #nodeCard.open {
      opacity: 1; pointer-events: auto;
      transform: translateY(-50%) translateX(0);
    }
    .card-inner {
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #nodeCard.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      background: rgba(10, 14, 28, 0.62);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      padding: 26px 28px 22px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(190, 205, 255, 0.08);
      max-height: 88vh; overflow-y: auto;
    }
    .card-back { position: absolute; inset: 0; transform: rotateY(180deg); overflow-y: auto; }
    .card-close {
      position: absolute; top: 14px; right: 16px;
      appearance: none; border: 0; background: transparent;
      color: var(--ink-dim); font-size: 20px; line-height: 1;
      cursor: pointer; transition: color 0.3s;
    }
    .card-close:hover { color: var(--ink); }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 10.5px; letter-spacing: 0.16em; color: var(--ink-dim); }
    .card-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .card-title {
      margin-top: 10px;
      font-size: 21px; font-weight: 600; line-height: 1.3;
      text-shadow: 0 0 18px rgba(140, 170, 255, 0.3);
    }
    .card-sub { margin-top: 6px; font-size: 11.5px; line-height: 1.6; color: var(--ink-dim); }
    .card-body {
      margin-top: 14px;
      font-size: 13px; line-height: 1.85; letter-spacing: 0.01em;
      color: rgba(225, 232, 250, 0.82);
      /* C5: long abstract/idea text must not overflow the panel — it
         scrolls within the fixed max-height card-face instead. */
      white-space: pre-wrap;
    }
    .card-chips { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      display: inline-block;
      font-size: 10px; letter-spacing: 0.06em;
      padding: 3px 9px; border-radius: 999px;
      background: rgba(140, 165, 255, 0.1);
      border: 1px solid rgba(150, 175, 255, 0.18);
      color: rgba(200, 215, 250, 0.85);
    }
    .chip-idea { background: rgba(168, 120, 255, 0.14); border-color: rgba(168, 120, 255, 0.3); color: rgba(220, 200, 255, 0.9); }
    .card-link {
      display: inline-block; margin-top: 14px;
      font-size: 12px; color: rgba(140, 190, 255, 0.9);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    /* —— Novelty gauge row: distinctive radial arc, not a plain badge —— */
    .card-novelty-row { margin-top: 14px; display: flex; align-items: center; gap: 14px; }
    .card-novelty-gauge { flex-shrink: 0; }
    .card-novelty-tags { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }

    .card-flip {
      margin-top: 16px; width: 100%;
      appearance: none; border: 1px solid rgba(150, 175, 255, 0.14);
      background: rgba(140, 165, 255, 0.06);
      color: var(--ink-dim);
      font-family: inherit; font-size: 11.5px; letter-spacing: 0.14em;
      padding: 9px 0; border-radius: 10px; cursor: pointer;
      transition: color 0.3s, background 0.3s;
    }
    .card-flip:hover { color: var(--ink); background: rgba(140, 165, 255, 0.12); }
    .card-back h3 { font-size: 18px; font-weight: 600; margin-top: 4px; }
    .card-sec { margin-top: 18px; }
    .card-sec h4 {
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em;
      color: var(--ink-dim); margin-bottom: 8px;
    }
    .card-sec ul { list-style: none; }
    .card-sec li {
      font-size: 12.5px; line-height: 1.75; letter-spacing: 0.01em;
      color: rgba(225, 232, 250, 0.85);
      padding-left: 14px; position: relative;
    }
    .card-sec li::before {
      content: ''; position: absolute; left: 0; top: 0.8em;
      width: 5px; height: 1px; background: rgba(160, 185, 255, 0.5);
    }
    .card-sec p {
      font-size: 12.5px; line-height: 1.7; color: rgba(220, 228, 250, 0.8);
    }

    /* Node title labels: fade in tier-by-tier as camera approaches */
    .star-label {
      color: var(--ink);
      white-space: nowrap;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 12px rgba(3, 4, 10, 0.95),
        0 0 4px rgba(3, 4, 10, 1),
        0 1px 2px rgba(0, 0, 0, 0.85);
      padding-top: 34px;
      opacity: 0;
      transition: opacity 0.35s ease;
      user-select: none;
    }
    .star-label--high { font-size: 13px; font-weight: 600; }
    .star-label--mid { font-size: 11px; color: rgba(235, 240, 255, 0.72); padding-top: 28px; }
    .star-label--low { font-size: 10px; color: rgba(235, 240, 255, 0.55); padding-top: 24px; }

    /* Topic legend */
    #branchLegend {
      display: flex; flex-wrap: wrap; gap: 8px; max-width: 620px;
      pointer-events: none;
      animation: hudIn 1.2s ease 0.5s backwards;
    }
    #branchLegend .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 9.5px; letter-spacing: 0.06em;
      color: var(--ink-dim);
      padding: 4px 8px; border-radius: 999px;
      pointer-events: auto; cursor: pointer;
      border: 1px solid transparent;
      transition: color 0.4s ease, background 0.4s ease, border-color 0.4s ease;
    }
    #branchLegend .legend-item:hover { color: var(--ink); }
    #branchLegend .legend-item.active {
      color: var(--ink);
      background: rgba(150, 170, 255, 0.12);
      border-color: rgba(170, 190, 255, 0.18);
    }
    #branchLegend .legend-dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
      transition: box-shadow 0.4s ease;
    }
    #branchLegend .legend-item:hover .legend-dot,
    #branchLegend .legend-item.active .legend-dot {
      box-shadow: 0 0 10px currentColor;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud hud-title">
    <div class="hud-title-main">
      <h1 id="appTitle">Research Idea Atlas</h1>
    </div>
    <span id="appSubtitle">Papers × Generated Ideas</span>
    <div id="branchLegend" aria-label="Topic legend"></div>
  </div>

  <button class="hud hud-composer-toggle" id="composerToggle" type="button" aria-label="Generate ideas" title="Generate ideas">✦</button>
  <div class="hud hud-styles hud-lenses" id="lensSwitcher" aria-label="Lens"></div>

  <div class="hud hud-hint" id="hudHint">DRAG TO ROTATE · SCROLL TO ZOOM</div>
  <button class="hud hud-reset" id="resetView" type="button" aria-label="Reset view" title="Reset view">↺</button>
  <div class="hud" id="fps"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Atlas · Idea Discovery &amp; Evidence Map</title>
  <style>
    :root {
      --ink: rgba(235, 240, 255, 0.92);
      --ink-dim: rgba(235, 240, 255, 0.45);
      --glass: rgba(14, 18, 34, 0.38);
      --glass-border: rgba(160, 180, 255, 0.14);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04050c; }
    body {
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }

    .hud { position: fixed; z-index: 10; user-select: none; }
    .hud-title { animation: hudIn 1.8s ease 0.8s backwards; }
    .hud-styles { animation: hudIn 1.8s ease 3.4s backwards; }
    .hud-search { animation: hudIn 1.8s ease 3.8s backwards; }
    @keyframes hudIn { from { opacity: 0; } }

    .hud-title { top: 28px; left: 34px; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
    .hud-title-main { display: flex; align-items: center; gap: 18px; }
    .hud-title h1 {
      font-size: 17px; font-weight: 600; letter-spacing: 0.12em;
      color: var(--ink); text-shadow: 0 0 24px rgba(120, 150, 255, 0.35);
    }
    .hud-title span {
      font-size: 9.5px; font-weight: 400; letter-spacing: 0.28em;
      color: var(--ink-dim); text-transform: uppercase;
    }

    .hud-styles {
      top: 30px; right: 34px; display: flex; align-items: center; gap: 4px; padding: 5px;
      background: var(--glass); border: 1px solid var(--glass-border); border-radius: 999px;
      backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
    }
    .hud-styles button {
      appearance: none; border: 0; background: transparent;
      font-family: inherit; font-size: 12px; letter-spacing: 0.08em; color: var(--ink-dim);
      padding: 7px 16px; border-radius: 999px; cursor: pointer;
      transition: color 0.5s ease, background 0.5s ease;
    }
    .hud-styles button:hover { color: var(--ink); }
    .hud-styles button.active {
      color: var(--ink); background: rgba(150, 170, 255, 0.13);
      box-shadow: inset 0 0 0 1px rgba(170, 190, 255, 0.18);
    }

    /* search */
    .hud-search { top: 88px; left: 34px; width: 300px; }
    .search-input {
      width: 100%; appearance: none; border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3); border-radius: 999px;
      color: var(--ink); font-family: inherit; font-size: 12px; letter-spacing: 0.02em;
      padding: 9px 16px; outline: none; transition: border-color 0.3s;
    }
    .search-input::placeholder { color: rgba(235, 240, 255, 0.3); }
    .search-input:focus { border-color: rgba(160, 185, 255, 0.35); }
    .search-results {
      list-style: none; margin-top: 8px; background: rgba(10, 14, 28, 0.72);
      border: 1px solid var(--glass-border); border-radius: 14px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      overflow: hidden; display: none;
    }
    .hud-search.has-results .search-results { display: block; }
    .search-results li {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 9px 16px; cursor: pointer; font-size: 12px;
      color: rgba(228, 235, 252, 0.85); transition: background 0.25s;
      gap: 12px;
    }
    .search-results li span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-results li:hover, .search-results li.hit { background: rgba(140, 165, 255, 0.1); }
    .search-results li i { font-style: normal; font-size: 10px; color: var(--ink-dim); flex-shrink: 0; }
    .search-results li.generate-hit { color: rgba(255, 140, 220, 0.9); }
    .search-results li.generate-hit:hover { background: rgba(255, 77, 210, 0.12); }

    .hud-hint {
      bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.2em; color: var(--ink-dim);
      pointer-events: none; opacity: 0; animation: hintIn 2.4s ease 1.8s forwards;
    }
    @keyframes hintIn { to { opacity: 1; } }

    .hud-reset {
      bottom: 58px; left: 50%; transform: translateX(-50%);
      width: 34px; height: 34px; appearance: none; border: 1px solid var(--glass-border);
      border-radius: 50%; background: var(--glass); color: var(--ink-dim);
      font-size: 20px; line-height: 1; cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease, transform 0.2s ease;
      animation: hudIn 1.8s ease 4.8s backwards;
    }
    .hud-reset:hover { color: var(--ink); border-color: rgba(170, 190, 255, 0.26); background: rgba(140, 165, 255, 0.09); }
    .hud-reset:active { transform: translateX(-50%) scale(0.94); }

    .hud-generate {
      bottom: 26px; right: 34px;
      appearance: none; border: 1px solid rgba(255, 100, 220, 0.3);
      background: rgba(255, 77, 210, 0.08); color: rgba(255, 200, 240, 0.92);
      font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
      padding: 10px 18px; border-radius: 999px; cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3); -webkit-backdrop-filter: blur(14px) saturate(1.3);
      transition: background 0.3s;
      animation: hudIn 1.8s ease 4.2s backwards;
    }
    .hud-generate:hover { background: rgba(255, 77, 210, 0.16); }

    #fps { bottom: 22px; right: 30px; font-family: "SF Mono", Menlo, monospace; font-size: 10px; color: var(--ink-dim); display: none; }

    /* node card */
    #nodeCard {
      position: fixed; z-index: 20; top: 50%; right: 38px;
      transform: translateY(-50%) translateX(24px);
      width: 420px; max-height: 88vh; overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #nodeCard.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
    .card-face {
      background: rgba(10, 14, 28, 0.68); border: 1px solid var(--glass-border);
      border-radius: 18px; backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      padding: 26px 28px 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(190, 205, 255, 0.08);
      position: relative;
    }
    .card-close {
      position: absolute; top: 14px; right: 16px; appearance: none; border: 0; background: transparent;
      color: var(--ink-dim); font-size: 20px; line-height: 1; cursor: pointer; transition: color 0.3s;
    }
    .card-close:hover { color: var(--ink); }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; letter-spacing: 0.14em; color: var(--ink-dim); }
    .card-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 8px currentColor; display: inline-block; }
    .card-title { margin-top: 10px; font-size: 20px; font-weight: 600; letter-spacing: 0.01em; line-height: 1.3; }
    .card-authors { margin-top: 6px; font-size: 11px; letter-spacing: 0.04em; color: var(--ink-dim); }
    .card-abstract { margin-top: 16px; font-size: 13px; line-height: 1.8; color: rgba(225, 232, 250, 0.85); }
    .card-link {
      display: inline-block; margin-top: 16px; font-size: 12px; letter-spacing: 0.08em;
      color: rgba(120, 200, 255, 0.9); text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    .card-novelty { margin-top: 18px; display: flex; align-items: center; gap: 18px; }
    .novelty-ring {
      --pct: 0%; --hue: 280;
      width: 84px; height: 84px; border-radius: 50%; flex-shrink: 0;
      background: conic-gradient(hsl(calc(var(--hue) * 1deg), 90%, 65%) var(--pct), rgba(255,255,255,0.08) var(--pct));
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      box-shadow: 0 0 24px hsla(calc(var(--hue) * 1deg), 90%, 65%, 0.35);
      position: relative;
    }
    .novelty-ring::before {
      content: ''; position: absolute; inset: 8px; border-radius: 50%; background: rgba(8, 10, 20, 0.85);
    }
    .novelty-num { position: relative; font-size: 22px; font-weight: 700; }
    .novelty-label { position: relative; font-size: 8px; letter-spacing: 0.14em; color: var(--ink-dim); text-transform: uppercase; }
    .novelty-bars { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .novelty-bar-row { display: grid; grid-template-columns: 62px 1fr 24px; align-items: center; gap: 8px; font-size: 10.5px; color: var(--ink-dim); }
    .novelty-bar-row .bar { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .novelty-bar-row .bar i { display: block; height: 100%; background: linear-gradient(90deg, #6dc7ff, #ff4dd2); border-radius: 4px; transition: width 0.6s ease; }
    .novelty-bar-row b { text-align: right; font-weight: 600; color: rgba(225,232,250,0.85); }

    .card-risk {
      display: inline-block; margin-top: 12px; font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
    }
    .risk-incremental { background: rgba(120, 200, 255, 0.14); color: rgba(150, 210, 255, 0.9); }
    .risk-ambitious { background: rgba(255, 190, 100, 0.14); color: rgba(255, 200, 120, 0.9); }
    .risk-high-risk { background: rgba(255, 77, 150, 0.16); color: rgba(255, 140, 190, 0.95); }

    .card-sec { margin-top: 18px; }
    .card-sec h4 { font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
    .card-sec p { font-size: 12.5px; line-height: 1.75; color: rgba(225, 232, 250, 0.85); }
    .card-grounded { list-style: none; }
    .card-grounded li {
      font-size: 12px; line-height: 1.7; color: rgba(120, 200, 255, 0.9);
      cursor: pointer; padding-left: 14px; position: relative;
    }
    .card-grounded li:hover { color: rgba(180, 220, 255, 1); text-decoration: underline; }
    .card-grounded li::before { content: '→'; position: absolute; left: 0; }

    /* branch legend */
    #branchLegend { display: flex; flex-wrap: wrap; gap: 8px; pointer-events: none; animation: hudIn 1.8s ease 1.4s backwards; max-width: 420px; }
    #branchLegend .legend-item {
      display: flex; align-items: center; gap: 7px; font-size: 10px; letter-spacing: 0.06em;
      color: var(--ink-dim); padding: 4px 8px; border-radius: 999px; pointer-events: auto; cursor: pointer;
      border: 1px solid transparent; transition: color 0.4s ease, background 0.4s ease, border-color 0.4s ease;
    }
    #branchLegend .legend-item:hover { color: var(--ink); }
    #branchLegend .legend-item.active { color: var(--ink); background: rgba(150, 170, 255, 0.12); border-color: rgba(170, 190, 255, 0.18); }
    #branchLegend .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: box-shadow 0.4s ease; }
    #branchLegend .legend-item:hover .legend-dot, #branchLegend .legend-item.active .legend-dot { box-shadow: 0 0 10px currentColor; }

    /* generate panel */
    #generatePanel {
      position: fixed; z-index: 25; bottom: 84px; right: 34px; width: 380px;
      opacity: 0; pointer-events: none; transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #generatePanel.open { opacity: 1; pointer-events: auto; transform: none; }
    .gen-inner {
      background: rgba(10, 14, 28, 0.78); border: 1px solid rgba(255, 100, 220, 0.2);
      border-radius: 16px; backdrop-filter: blur(22px) saturate(1.3); -webkit-backdrop-filter: blur(22px) saturate(1.3);
      padding: 22px 22px 18px; position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    }
    .gen-close { position: absolute; top: 12px; right: 14px; appearance: none; border: 0; background: transparent; color: var(--ink-dim); font-size: 18px; cursor: pointer; }
    .gen-close:hover { color: var(--ink); }
    .gen-inner h3 { font-size: 14px; letter-spacing: 0.04em; margin-bottom: 8px; }
    .gen-sub { font-size: 11.5px; line-height: 1.7; color: var(--ink-dim); margin-bottom: 14px; }
    .gen-input {
      width: 100%; resize: vertical; background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--ink); font-family: inherit; font-size: 12.5px; padding: 10px 12px; outline: none;
    }
    .gen-input:focus { border-color: rgba(255, 100, 220, 0.4); }
    .gen-submit {
      margin-top: 10px; width: 100%; appearance: none; border: 1px solid rgba(255, 100, 220, 0.3);
      background: rgba(255, 77, 210, 0.1); color: rgba(255, 210, 240, 0.95);
      font-family: inherit; font-size: 12px; letter-spacing: 0.06em; padding: 9px 0; border-radius: 10px; cursor: pointer;
      transition: background 0.3s;
    }
    .gen-submit:hover { background: rgba(255, 77, 210, 0.18); }
    .gen-status { margin-top: 10px; font-size: 11px; line-height: 1.6; color: rgba(150, 210, 255, 0.85); }

    /* labels */
    .star-label {
      color: var(--ink); white-space: nowrap; letter-spacing: 0.02em; max-width: 220px;
      overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 0 12px rgba(3, 4, 10, 0.95), 0 0 4px rgba(3, 4, 10, 1), 0 1px 2px rgba(0, 0, 0, 0.85);
      padding-top: 34px; opacity: 0; transition: opacity 0.35s ease; user-select: none;
    }
    .star-label--high { font-size: 13px; }
    .star-label--mid { font-size: 11px; color: rgba(235, 240, 255, 0.72); padding-top: 28px; }
    .star-label--low { font-size: 10px; color: rgba(235, 240, 255, 0.55); padding-top: 24px; }
    .star-label--dust { font-size: 9px; color: rgba(235, 240, 255, 0.38); padding-top: 18px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud hud-title">
    <div class="hud-title-main">
      <h1>Research Atlas</h1>
      <div id="branchLegend" aria-label="Source legend"></div>
    </div>
    <span>Idea Discovery &amp; Evidence Map</span>
  </div>

  <div class="hud hud-styles" id="styleSwitcher" aria-label="Style"></div>

  <div class="hud hud-hint">drag to rotate &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; press / to search</div>
  <button class="hud hud-reset" id="resetView" type="button" aria-label="Reset view" title="Reset view">↺</button>
  <button class="hud hud-generate" id="generateOpen" type="button">+ Generate ideas</button>
  <div class="hud" id="fps"></div>

  <script type="module" src="/src/main.js"></script>
  <script type="module">
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('generateOpen').addEventListener('click', () => {
        document.getElementById('generatePanel')?.classList.add('open')
      })
    })
  </script>
</body>
</html>

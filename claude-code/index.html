<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Atlas</title>
  <style>
    :root {
      --ink: rgba(235, 240, 255, 0.92);
      --ink-dim: rgba(235, 240, 255, 0.45);
      --glass: rgba(14, 18, 34, 0.38);
      --glass-border: rgba(160, 180, 255, 0.14);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04050c; }
    body {
      font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    #app { position: fixed; inset: 0; }
    #app canvas { display: block; }

    .hud { position: fixed; z-index: 10; user-select: none; }
    .hud-title { animation: hudIn 1.8s ease 0.8s backwards; }
    .hud-styles { animation: hudIn 1.8s ease 3.4s backwards; }
    .hud-search { animation: hudIn 1.8s ease 3.8s backwards; }
    .hud-lenses { animation: hudIn 1.8s ease 4.2s backwards; }
    .hud-generate { animation: hudIn 1.8s ease 4.4s backwards; }
    @keyframes hudIn { from { opacity: 0; } }

    .hud-title {
      top: 28px; left: 34px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .hud-title-main { display: flex; align-items: center; gap: 18px; }
    .hud-title h1 {
      font-size: 17px; font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--ink);
      text-shadow: 0 0 24px rgba(120, 150, 255, 0.35);
    }
    .hud-title span {
      font-size: 9.5px; font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--ink-dim);
      text-transform: uppercase;
    }
    .hud-styles {
      top: 30px; right: 34px;
      display: flex; align-items: center; gap: 4px;
      padding: 5px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
    }
    .hud-styles button {
      appearance: none; border: 0; background: transparent;
      font-family: inherit; font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--ink-dim);
      padding: 7px 16px; border-radius: 999px;
      cursor: pointer;
      transition: color 0.5s ease, background 0.5s ease;
    }
    .hud-styles button:hover { color: var(--ink); }
    .hud-styles button.active {
      color: var(--ink);
      background: rgba(150, 170, 255, 0.13);
      box-shadow: inset 0 0 0 1px rgba(170, 190, 255, 0.18);
    }
    .hud-lenses { top: auto; bottom: 26px; left: 34px; right: auto; }

    /* search box */
    .hud-search { top: 92px; left: 34px; width: 260px; }
    .search-input {
      width: 100%;
      appearance: none; border: 1px solid var(--glass-border);
      background: var(--glass);
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      border-radius: 999px;
      color: var(--ink);
      font-family: inherit; font-size: 12px; letter-spacing: 0.04em;
      padding: 8px 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-input::placeholder { color: rgba(235, 240, 255, 0.3); }
    .search-input:focus { border-color: rgba(160, 185, 255, 0.35); }
    .search-results {
      list-style: none; margin-top: 8px;
      background: rgba(10, 14, 28, 0.72);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      display: none;
    }
    .hud-search.has-results .search-results { display: block; }
    .search-results li {
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
      padding: 9px 16px; cursor: pointer;
      font-size: 12px; letter-spacing: 0.02em;
      color: rgba(228, 235, 252, 0.85);
      transition: background 0.25s;
    }
    .search-results li:hover, .search-results li.hit { background: rgba(140, 165, 255, 0.1); }
    .search-results li i { font-style: normal; font-size: 10px; color: var(--ink-dim); white-space: nowrap; }

    /* generate-idea panel */
    .hud-generate { top: 78px; right: 34px; width: 340px; text-align: right; }
    .generate-toggle {
      appearance: none; border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--ink);
      font-family: inherit; font-size: 12px; letter-spacing: 0.1em;
      padding: 8px 18px; border-radius: 999px; cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      transition: background 0.3s;
    }
    .generate-toggle:hover { background: rgba(255, 106, 213, 0.14); }
    .generate-body {
      margin-top: 10px; text-align: left;
      display: none;
      background: rgba(10, 14, 28, 0.78);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
    }
    .hud-generate.open .generate-body { display: block; }
    .generate-input {
      width: 100%; resize: vertical;
      appearance: none; border: 1px solid var(--glass-border);
      background: rgba(4, 6, 14, 0.5);
      color: var(--ink);
      font-family: inherit; font-size: 12.5px; line-height: 1.5;
      padding: 10px 12px; border-radius: 10px;
      outline: none;
    }
    .generate-actions { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .generate-submit {
      appearance: none; border: 1px solid rgba(255, 106, 213, 0.3);
      background: rgba(255, 106, 213, 0.12);
      color: rgba(255, 220, 245, 0.95);
      font-family: inherit; font-size: 11.5px; letter-spacing: 0.14em;
      padding: 7px 16px; border-radius: 8px; cursor: pointer;
      transition: background 0.3s;
    }
    .generate-submit:hover { background: rgba(255, 106, 213, 0.22); }
    .generate-status { font-size: 11px; color: var(--ink-dim); }
    .generate-preview {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid rgba(150, 175, 255, 0.12);
      display: none;
    }
    .generate-preview.show { display: block; }
    .generate-preview-title { font-size: 13.5px; font-weight: 600; line-height: 1.4; }
    .generate-preview-novelty { margin-top: 4px; font-size: 11px; color: #ff6ad5; letter-spacing: 0.08em; }
    .generate-preview-hyp { margin-top: 6px; font-size: 12px; line-height: 1.6; color: rgba(225, 232, 250, 0.82); }
    .generate-accept {
      margin-top: 10px; width: 100%;
      appearance: none; border: 1px solid rgba(255, 106, 213, 0.3);
      background: rgba(255, 106, 213, 0.14);
      color: rgba(255, 220, 245, 0.95);
      font-family: inherit; font-size: 11.5px; letter-spacing: 0.14em;
      padding: 9px 0; border-radius: 8px; cursor: pointer;
      transition: background 0.3s;
    }
    .generate-accept:hover { background: rgba(255, 106, 213, 0.26); }

    .hud-hint {
      bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.3em;
      color: var(--ink-dim);
      pointer-events: none;
      opacity: 0; animation: hintIn 2.4s ease 1.8s forwards;
    }
    @keyframes hintIn { to { opacity: 1; } }

    .hud-reset {
      bottom: 58px; left: 50%; transform: translateX(-50%);
      width: 34px; height: 34px;
      appearance: none;
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      background: var(--glass);
      color: var(--ink-dim);
      font-size: 20px; line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(1.3);
      -webkit-backdrop-filter: blur(14px) saturate(1.3);
      box-shadow: inset 0 0 0 1px rgba(170, 190, 255, 0.05);
      transition: color 0.35s ease, border-color 0.35s ease, background 0.35s ease, transform 0.2s ease;
      animation: hudIn 1.8s ease 4.8s backwards;
    }
    .hud-reset:hover {
      color: var(--ink);
      border-color: rgba(170, 190, 255, 0.26);
      background: rgba(140, 165, 255, 0.09);
    }
    .hud-reset:active { transform: translateX(-50%) scale(0.94); }

    #fps {
      bottom: 22px; right: 30px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 10px; color: var(--ink-dim);
      display: none;
    }

    /* detail card */
    #starCard {
      position: fixed; z-index: 20;
      top: 50%; right: 38px; transform: translateY(-50%) translateX(24px);
      width: 400px; max-height: 88vh;
      perspective: 1600px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #starCard.open { opacity: 1; pointer-events: auto; transform: translateY(-50%) translateX(0); }
    .card-inner { position: relative; transform-style: preserve-3d; transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1); }
    #starCard.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      background: rgba(10, 14, 28, 0.62);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      backdrop-filter: blur(22px) saturate(1.25);
      -webkit-backdrop-filter: blur(22px) saturate(1.25);
      padding: 26px 28px 22px;
      max-height: 88vh; overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(190, 205, 255, 0.08);
    }
    .card-back { position: absolute; inset: 0; transform: rotateY(180deg); }
    .card-close {
      position: absolute; top: 14px; right: 16px;
      appearance: none; border: 0; background: transparent;
      color: var(--ink-dim); font-size: 20px; line-height: 1;
      cursor: pointer; transition: color 0.3s;
    }
    .card-close:hover { color: var(--ink); }
    .card-meta { display: flex; align-items: center; gap: 8px; font-size: 10.5px; letter-spacing: 0.16em; color: var(--ink-dim); }
    .card-dot { width: 7px; height: 7px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    .card-tag { margin-left: auto; opacity: 0.7; }
    #starCard.is-idea .card-tag { color: #ff6ad5; }
    .card-title { margin-top: 10px; font-size: 20px; font-weight: 600; line-height: 1.35; text-shadow: 0 0 18px rgba(140, 170, 255, 0.3); }
    .card-author { margin-top: 6px; font-size: 10.5px; letter-spacing: 0.04em; color: var(--ink-dim); }
    .card-novelty-wrap { display: flex; justify-content: center; margin: 14px 0 6px; }
    .card-oneliner { margin-top: 10px; font-size: 13px; line-height: 1.75; color: rgba(225, 232, 250, 0.82); }
    .card-link {
      display: inline-block; margin-top: 14px;
      font-size: 11.5px; letter-spacing: 0.08em;
      color: rgba(160, 200, 255, 0.9);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }
    .card-sec { margin-top: 16px; }
    .card-sec h4 { font-size: 10px; font-weight: 600; letter-spacing: 0.18em; color: var(--ink-dim); margin-bottom: 6px; }
    .card-sec p { font-size: 12.5px; line-height: 1.7; color: rgba(225, 232, 250, 0.82); }
    .card-flip {
      margin-top: 18px; width: 100%;
      appearance: none; border: 1px solid rgba(150, 175, 255, 0.14);
      background: rgba(140, 165, 255, 0.06);
      color: var(--ink-dim);
      font-family: inherit; font-size: 11.5px; letter-spacing: 0.14em;
      padding: 9px 0; border-radius: 10px; cursor: pointer;
      transition: color 0.3s, background 0.3s;
    }
    .card-flip:hover { color: var(--ink); background: rgba(140, 165, 255, 0.12); }
    .card-back h3 { font-size: 17px; font-weight: 600; margin-top: 4px; }
    .card-lineage { margin-top: 4px; }
    .card-sec ul { list-style: none; }
    .card-sec li {
      font-size: 12.5px; line-height: 1.7;
      color: rgba(225, 232, 250, 0.85);
      padding-left: 14px; position: relative;
    }
    .card-sec li::before { content: ''; position: absolute; left: 0; top: 0.85em; width: 5px; height: 1px; background: rgba(160, 185, 255, 0.5); }
    .card-sec li.is-link { cursor: pointer; color: rgba(160, 200, 255, 0.9); }
    .card-sec li.is-link:hover { text-decoration: underline; }

    /* star labels */
    .star-label {
      color: var(--ink);
      white-space: nowrap;
      max-width: 260px;
      overflow: hidden; text-overflow: ellipsis;
      letter-spacing: 0.01em;
      text-shadow: 0 0 12px rgba(3, 4, 10, 0.95), 0 0 4px rgba(3, 4, 10, 1), 0 1px 2px rgba(0, 0, 0, 0.85);
      padding-top: 34px;
      opacity: 0;
      transition: opacity 0.35s ease;
      user-select: none;
    }
    .star-label--high { font-size: 13px; }
    .star-label--mid { font-size: 11px; color: rgba(235, 240, 255, 0.72); padding-top: 28px; }
    .star-label--low { font-size: 10px; color: rgba(235, 240, 255, 0.55); padding-top: 24px; }
    .star-label--dust { font-size: 9px; color: rgba(235, 240, 255, 0.38); padding-top: 18px; }

    /* field legend */
    #branchLegend { display: flex; flex-wrap: wrap; gap: 8px; max-width: 640px; pointer-events: none; animation: hudIn 1.8s ease 1.4s backwards; }
    #branchLegend .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 9.5px; letter-spacing: 0.05em;
      color: var(--ink-dim);
      padding: 4px 8px; border-radius: 999px;
      pointer-events: auto; cursor: pointer;
      border: 1px solid transparent;
      transition: color 0.4s ease, background 0.4s ease, border-color 0.4s ease;
    }
    #branchLegend .legend-item:hover { color: var(--ink); }
    #branchLegend .legend-item.active { color: var(--ink); background: rgba(150, 170, 255, 0.12); border-color: rgba(170, 190, 255, 0.18); }
    #branchLegend .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: box-shadow 0.4s ease; }
    #branchLegend .legend-item:hover .legend-dot, #branchLegend .legend-item.active .legend-dot { box-shadow: 0 0 10px currentColor; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud hud-title">
    <div class="hud-title-main">
      <h1 id="appTitle">Research Atlas</h1>
    </div>
    <span id="appSubtitle">Papers &amp; Generated Ideas</span>
    <div id="branchLegend" aria-label="Field legend"></div>
  </div>

  <div class="hud hud-styles" id="styleSwitcher" aria-label="Visual style"></div>
  <div class="hud hud-styles hud-lenses" id="lensSwitcher" aria-label="Lens"></div>

  <div class="hud hud-hint" id="hudHint">DRAG TO ORBIT &nbsp;·&nbsp; SCROLL TO ZOOM</div>
  <button class="hud hud-reset" id="resetView" type="button" aria-label="Reset view" title="Reset view">↺</button>
  <div class="hud" id="fps"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
